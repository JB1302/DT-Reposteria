<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <link rel="icon" type="image/x-icon" href="../../assets/static/favicon/favicon.ico">
  <title>DT Repostería - Hacer pedido</title>
</head>

<body>

  </header>

  <div id="navbar"></div>

  <main class="container mt-5 mb-5">
    <div class="pedido-card card border-0 shadow-sm">
      <div class="pedido-card-header">
        <h4 class="mb-0 font-weight-bold">Hacer pedido</h4>
      </div>

      <div class="card-body p-4">
        <form id="pedidoForm">
          <div class="form-group">
            <label for="clienteSelect" class="pedido-label">Cliente</label>
            <select id="clienteSelect" class="form-control pedido-input" required>
              <option value="">Seleccione un cliente</option>
            </select>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-2">
            <label class="pedido-label mb-0">Productos</label>
            <button type="button" id="btnAgregarProducto" class="btn pedido-btn-outline btn-sm">
              Agregar producto
            </button>
          </div>

          <div id="productosContainer"></div>

          <div class="form-group mt-4">
            <label for="metodoPago" class="pedido-label">Método de pago</label>
            <select id="metodoPago" class="form-control pedido-input" required>
              <option value="">Seleccione un método de pago</option>
              <option value="Efectivo">Efectivo</option>
              <option value="Sinpe Móvil">Sinpe Móvil</option>
              <option value="Tarjeta">Tarjeta</option>
              <option value="Transferencia">Transferencia</option>
            </select>
          </div>

          <div class="form-group">
            <label for="observaciones" class="pedido-label">Observaciones</label>
            <textarea id="observaciones" class="form-control pedido-input pedido-textarea" rows="4"
              placeholder="Ejemplo: Sin azúcar extra"></textarea>
          </div>

          <div id="mensajePedido" class="mb-3"></div>

          <button type="submit" class="btn pedido-btn-primary">
            Enviar pedido
          </button>
        </form>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <div id="footer"></div>

  <!-- jQuery completo -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Componentes generales -->
  <script src="../js/components.js"></script>

  <!-- Tabla reusable -->
  <script src="../js/table-component.js"></script>

  <!-- Loader -->
  <script src="../js/table-loader.js"></script>

  <!-- Lógica -->
  <script src="../js/app.js"></script>

  <!--Formulario -->
  <script src="../js/form-component.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" crossorigin="anonymous"></script>
</body>

</html>
